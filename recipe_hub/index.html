    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F6CEFC;
        color: #1a0e1b;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F6CEFC;
      }
      ::-webkit-scrollbar-thumb {
        background: #e5b3eb;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d4a2da;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Premium Glow Effect */
      @keyframes premium-glow {
        0% { box-shadow: 0 0 5px #a832d3, 0 0 10px #a832d3; border-color: #a832d3; }
        50% { box-shadow: 0 0 15px #ff00ff, 0 0 25px #a832d3; border-color: #ff00ff; }
        100% { box-shadow: 0 0 5px #a832d3, 0 0 10px #a832d3; border-color: #a832d3; }
      }
      .premium-avatar-glow {
        animation: premium-glow 2s infinite ease-in-out;
        border-width: 3px !important;
      }
    </style>
